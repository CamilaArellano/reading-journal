<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quotes — reading journal</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
<style>
.quotes-header {
  font-family: var(--font-hand);
  font-size: 2rem;
  color: var(--text);
  margin-bottom: 0.25rem;
}

.quotes-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  margin-bottom: 1.5rem;
}

/* Two-column quotes layout */
.quotes-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(129,53,38,0.12);
  border: 1px solid rgba(129,53,38,0.12);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.quotes-col {
  background: rgba(255,255,255,0.3);
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.quote-item {
  padding-bottom: 1.25rem;
  border-bottom: 1px dashed rgba(129,53,38,0.12);
}
.quote-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.quote-text {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 0.875rem;
  line-height: 1.8;
  color: var(--text);
  margin-bottom: 6px;
}

.quote-source {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
}

.quote-source strong {
  color: var(--tab-active);
  font-weight: normal;
}

/* Opening decorative mark */
.quote-mark {
  font-family: Georgia, serif;
  font-size: 2.5rem;
  line-height: 0.5;
  color: rgba(241,198,217,0.5);
  margin-bottom: 4px;
  display: block;
}

@media (max-width: 560px) {
  .quotes-cols { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="notebook">

    <div class="quotes-header">Favorites<br>quotes</div>
    <div class="quotes-sub">lines that stayed with me</div>

    <div class="quotes-cols" id="quotes-container">
      <!-- Rendered by JS -->
    </div>

  </div>

  <nav class="sidebar">
    <a href="my-books.html"  class="tab-btn"><span>My Books</span></a>
    <a href="quotes.html"    class="tab-btn active"><span>Quotes</span></a>
    <a href="favorites.html" class="tab-btn"><span>Favorites</span></a>
    <a href="index.html"     class="tab-btn"><span>Home</span></a>
  </nav>
</div>

<script src="js/books.js"></script>
<script>
function buildQuotes() {
  const quotes = getAllQuotes();
  const container = document.getElementById('quotes-container');

  // Split into two columns
  const mid = Math.ceil(quotes.length / 2);
  const left  = quotes.slice(0, mid);
  const right = quotes.slice(mid);

  function renderCol(items) {
    const div = document.createElement('div');
    div.className = 'quotes-col';
    items.forEach(q => {
      div.innerHTML += `
        <div class="quote-item">
          <span class="quote-mark">"</span>
          <div class="quote-text">${q.text}"</div>
          <div class="quote-source">— <strong>${q.book}</strong> by ${q.author}</div>
        </div>`;
    });
    return div;
  }

  container.appendChild(renderCol(left));
  container.appendChild(renderCol(right));
}

buildQuotes();
</script>
</body>
</html>
