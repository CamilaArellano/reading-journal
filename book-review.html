<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book review — reading journal</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
<style>
/* ── Review layout ── */
.review-title-bar {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid rgba(129,53,38,0.12);
}

.review-cols {
  display: grid;
  grid-template-columns: 195px 1fr;
  gap: 1.25rem;
  margin-bottom: 1.25rem;
}

/* LEFT */
.book-detail-cover {
  width: 130px;
  height: 182px;
  border: 1.5px solid var(--text-light);
  border-radius: 3px;
  overflow: hidden;
  background: var(--sheet);
  box-shadow: 3px 4px 12px rgba(100,60,40,0.18);
  margin: 0 auto 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.book-detail-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

.details-box {
  border: 1px solid rgba(129,53,38,0.12);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
  background: rgba(255,255,255,0.5);
  margin-bottom: 0.75rem;
}
.details-title {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-align: center;
  margin-bottom: 7px;
}
.detail-row {
  display: flex;
  gap: 5px;
  margin-bottom: 4px;
  align-items: baseline;
}
.detail-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}
.detail-value {
  font-family: var(--font-serif);
  font-size: 0.78rem;
  color: var(--text);
}
.rating-row { margin-top: 7px; }

/* Edit button */
.edit-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(129,53,38,0.12);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  width: 100%;
  justify-content: center;
}
.edit-btn:hover { background: rgba(241,198,217,0.5); color: var(--text); }
.edit-btn.secondary { margin-top: 8px; }

/* RIGHT */
.thoughts-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

/* Rendered markdown styles */
.thoughts-text {
  font-family: var(--font-serif);
  font-size: 0.875rem;
  line-height: 1.85;
  color: var(--text);
}
.thoughts-text p          { margin-bottom: 0.75rem; }
.thoughts-text h2         { font-family: var(--font-hand); font-size: 1.1rem; color: var(--text); margin: 1rem 0 0.4rem; }
.thoughts-text h3         { font-family: var(--font-hand); font-size: 0.95rem; color: var(--text-light); margin: 0.75rem 0 0.3rem; }
.thoughts-text strong     { font-weight: 600; }
.thoughts-text em         { font-style: italic; color: var(--text-light); }
.thoughts-text ul         { padding-left: 1.25rem; margin-bottom: 0.75rem; }
.thoughts-text li         { margin-bottom: 0.25rem; }
.thoughts-text blockquote {
  border-left: 3px solid rgba(129,53,38,0.3);
  padding: 4px 10px;
  color: var(--text-light);
  font-style: italic;
  margin: 0.75rem 0;
  background: rgba(232,180,188,0.08);
  border-radius: 0 4px 4px 0;
}

/* Markdown textarea */
#markdown-editor {
  width: 100%;
  min-height: 200px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  line-height: 1.7;
  padding: 10px 12px;
  background: rgba(255,255,255,0.7);
  border: 1px solid rgba(129,53,38,0.12);
  border-radius: var(--radius-sm);
  color: var(--text);
  resize: vertical;
  transition: border-color 0.15s;
}
#markdown-editor:focus {
  outline: none;
  border-color: rgba(129,53,38,0.3);
}

.editor-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.save-indicator {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--green, #6a9b6a);
}

/* BOTTOM: summary + quote */
.review-bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  padding-top: 1rem;
  border-top: 1px dashed rgba(129,53,38,0.12);
}
.bottom-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.summary-text {
  font-family: var(--font-serif);
  font-size: 0.82rem;
  line-height: 1.75;
  color: var(--text-light);
}
.quote-inner {
  border-left: 3px solid rgba(129,53,38,0.3);
  padding: 8px 10px;
  background: rgba(232,180,188,0.1);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 0.82rem;
  color: var(--text-light);
  line-height: 1.7;
}
.quote-attribution {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 5px;
}

/* Back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: none;
  margin-bottom: 1rem;
  transition: color 0.15s;
}
.back-link:hover { color: var(--tab-active); }

/* Not found */
.not-found {
  text-align: center;
  padding: 3rem;
  font-family: var(--font-hand);
  font-size: 1.5rem;
  color: var(--text-muted);
}

@media (max-width: 600px) {
  .review-cols    { grid-template-columns: 1fr; }
  .review-bottom  { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page-wrap">

  <div class="notebook" id="review-content">
    <div style="text-align:center;padding:3rem;color:var(--text-muted);font-family:var(--font-hand)">
      loading...
    </div>
  </div>

  <nav class="sidebar">
    <a href="my-books.html"  class="tab-btn"><span>My Books</span></a>
    <a href="quotes.html"    class="tab-btn"><span>Quotes</span></a>
    <a href="favorites.html" class="tab-btn"><span>Favorites</span></a>
    <a href="index.html"     class="tab-btn"><span>Home</span></a>
  </nav>

</div>

<!-- Cargar en orden: primero datos, luego renderer -->
<script src="js/books.js"></script>
<script>
function renderReviewPage() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const container = document.getElementById('review-content');
  const book = id ? getBookById(id) : null;

  if (!book) {
    container.innerHTML = '<div class="not-found">book not found 📖</div>';
    return;
  }

  document.title = book.title + ' — reading journal';

  const coverHtml = book.cover
    ? `<img src="${book.cover}" alt="${book.title}" onerror="this.parentElement.innerHTML='<span style=font-size:3rem>📖</span>'">`
    : '<span style="font-size:3rem">📖</span>';

  const formatDate = d => d
    ? new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})
    : '—';

  container.innerHTML = `
    <a href="my-books.html" class="back-link">← my books</a>
    <div class="review-title-bar">book review</div>
    <div class="review-cols">
      <div class="review-left">
        <div class="book-detail-cover">${coverHtml}</div>
        <div class="details-box">
          <div class="details-title">Book details</div>
          <div class="detail-row"><span class="detail-label">Title:</span>    <span class="detail-value">${book.title}</span></div>
          <div class="detail-row"><span class="detail-label">Author:</span>   <span class="detail-value">${book.author}</span></div>
          <div class="detail-row"><span class="detail-label">Genre:</span>    <span class="detail-value">${book.genre}</span></div>
          <div class="detail-row"><span class="detail-label">Format:</span>   <span class="detail-value">${book.format}</span></div>
          <div class="detail-row"><span class="detail-label">Start:</span>    <span class="detail-value">${formatDate(book.startDate)}</span></div>
          <div class="detail-row"><span class="detail-label">Finished:</span> <span class="detail-value">${formatDate(book.finishedDate)}</span></div>
          <div class="detail-row rating-row"><span class="detail-label">Rating:</span> <span>${renderStars(book.rating)}</span></div>
        </div>
      </div>
      <div class="review-right">
        <div class="thoughts-label">Thoughts</div>
        <div class="thoughts-text">${book.thoughts || '<p style="color:var(--text-muted)">No thoughts written yet.</p>'}</div>
      </div>
    </div>
    <div class="review-bottom">
      <div class="summary-box">
        <div class="bottom-label">Summary</div>
        <div class="summary-text">${book.summary || ''}</div>
      </div>
      <div class="quote-box">
        <div class="bottom-label">Favorite quote</div>
        ${book.quote
          ? `<div class="quote-inner">${book.quote}</div><div class="quote-attribution">— ${book.author}</div>`
          : '<p style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">no quote saved</p>'
        }
      </div>
    </div>`;
}

renderReviewPage();
</script>
</body>
</html>
